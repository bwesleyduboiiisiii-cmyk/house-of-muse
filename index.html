/* ===================================================================
   PUSH NOTIFICATIONS (OneSignal) -- paste your OneSignal App ID below.
   Get it from onesignal.com -> your app -> Settings -> Keys & IDs.
   =================================================================== */
var ONESIGNAL_APP_ID = 'da44b2ad-257a-4baf-a202-82f933238f91';
window.OneSignalDeferred = window.OneSignalDeferred || [];
window._osReady = false;
window._notif = { ready:false };
window.OneSignalDeferred.push(async function(OneSignal){
  try{ if(!ONESIGNAL_APP_ID) return;
    await OneSignal.init({ appId: ONESIGNAL_APP_ID, allowLocalhostAsSecureOrigin:true });
    window._os = OneSignal; window._osReady = true;
    try{ OneSignal.Notifications.addEventListener('permissionChange', updateNotifState); }catch(e){}
    try{ OneSignal.User.PushSubscription.addEventListener('change', updateNotifState); }catch(e){}
    if(typeof linkPush==='function') linkPush();
    updateNotifState();
  }catch(e){ console.warn('OneSignal init', e); }
});
function updateNotifState(){ try{ const O=window._os; if(!O){ window._notif={ready:false}; return; }
    const granted = !!O.Notifications.permission;
    const native = O.Notifications.permissionNative;            // 'granted' | 'denied' | 'default'
    const optedIn = !!(O.User && O.User.PushSubscription && O.User.PushSubscription.optedIn);
    const id = (O.User && O.User.PushSubscription && O.User.PushSubscription.id) || null;
    window._notif = { ready:true, granted, native, optedIn, hasToken:!!id };
    if(typeof ROUTE!=='undefined' && ROUTE==='settings' && typeof me==='function' && me() && typeof render==='function') render();
  }catch(e){ window._notif={ready:false}; } }
async function toggleNotif(){
  if(!ONESIGNAL_APP_ID){ toast('Owner: add your OneSignal App ID first','bad'); return; }
  const O=window._os; if(!O){ toast('Notifications still loading \u2014 try again in a moment','bad'); return; }
  const st=window._notif||{};
  try{
    if(st.optedIn && st.granted){ await O.User.PushSubscription.optOut(); toast('Notifications turned off'); }
    else {
      if(O.Notifications.permissionNative==='denied'){ toast('Your browser blocked notifications. Tap the lock icon by the web address \u2192 Notifications \u2192 Allow, then try again.','bad'); updateNotifState(); return; }
      await O.Notifications.requestPermission();
      await O.User.PushSubscription.optIn();
      if(typeof linkPush==='function') linkPush();
      if(window._notif && window._notif.native==='denied'){ toast('Looks like it was blocked \u2014 allow notifications for this site and retry.','bad'); }
      else toast('Notifications on \u2014 you\u2019ll get squad pings \u26A1','gold');
    }
  }catch(e){ toast('Could not change notifications: '+(e.message||e),'bad'); }
  updateNotifState();
}
function enableNotifications(){ toggleNotif(); }
function linkPush(){ try{ const u=(typeof me==='function')?me():null; if(window._os && u){ window._os.login(String(u.id)); window._os.User.addTag('role', u.role||'Member'); window._os.User.addTag('callsign', u.username||''); } }catch(e){} }

function heroArt(mode, pos){
  const p = pos || (mode === "banner" ? "center 40%" : "center center");
  return `<div style="position:absolute;inset:0;background:#0B0A12;background-image:url(${POSTER_IMG});background-size:cover;background-position:${p};background-repeat:no-repeat"></div>`;
}
function heroSVG(mode){
  // mode: 'poster' (full, subject right) | 'banner' (text-free crop)
  const vb = mode === 'banner' ? '120 20 560 360' : '0 0 800 450';
  return `
  <svg viewBox="${vb}" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;display:block">
    <defs>
      <radialGradient id="sky" cx="64%" cy="40%" r="75%">
        <stop offset="0%" stop-color="#3a2a6b"/>
        <stop offset="42%" stop-color="#1c1530"/>
        <stop offset="100%" stop-color="#0B0A12"/>
      </radialGradient>
      <radialGradient id="halo" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#F6E3B0" stop-opacity=".95"/>
        <stop offset="35%" stop-color="#E6C27A" stop-opacity=".55"/>
        <stop offset="100%" stop-color="#E6C27A" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="lyre" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#F6E3B0"/>
        <stop offset="55%" stop-color="#E6C27A"/>
        <stop offset="100%" stop-color="#b8923f"/>
      </linearGradient>
      <linearGradient id="col" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#2a2342"/>
        <stop offset="100%" stop-color="#15101f"/>
      </linearGradient>
      <filter id="soft"><feGaussianBlur stdDeviation="6"/></filter>
    </defs>
    <rect x="0" y="0" width="800" height="450" fill="url(#sky)"/>
    <!-- gallery arches silhouette -->
    <g fill="url(#col)" opacity=".85">
      <rect x="60" y="250" width="34" height="200"/><rect x="150" y="250" width="34" height="200"/>
      <rect x="620" y="250" width="34" height="200"/><rect x="710" y="250" width="34" height="200"/>
      <path d="M60 250 a55 55 0 0 1 124 0 z"/><path d="M620 250 a55 55 0 0 1 124 0 z"/>
    </g>
    <!-- light rays -->
    <g opacity=".5" style="mix-blend-mode:screen">
      <polygon points="520,180 540,0 560,180" fill="#E6C27A" opacity=".18"/>
      <polygon points="520,180 600,20 620,200" fill="#E6C27A" opacity=".12"/>
      <polygon points="520,180 440,30 460,200" fill="#8B5CF6" opacity=".14"/>
    </g>
    <!-- halo -->
    <circle cx="520" cy="200" r="170" fill="url(#halo)" filter="url(#soft)"/>
    <!-- the lyre -->
    <g transform="translate(520,205)" stroke="url(#lyre)" stroke-width="9" fill="none" stroke-linecap="round">
      <path d="M-70 70 C -120 -30 -70 -120 -10 -118"/>
      <path d="M70 70 C 120 -30 70 -120 10 -118"/>
      <path d="M-70 70 Q 0 110 70 70" stroke-width="12"/>
      <line x1="-12" y1="-110" x2="12" y2="-110" stroke-width="8"/>
    </g>
    <g transform="translate(520,205)" stroke="#F6E3B0" stroke-width="2.2" opacity=".9">
      <line x1="-34" y1="-92" x2="-26" y2="78"/><line x1="-17" y1="-100" x2="-12" y2="84"/>
      <line x1="0" y1="-104" x2="0" y2="88"/><line x1="17" y1="-100" x2="12" y2="84"/>
      <line x1="34" y1="-92" x2="26" y2="78"/>
    </g>
    <!-- stardust -->
    <g fill="#F6E3B0">
      <circle cx="430" cy="120" r="2.2" opacity=".9"/><circle cx="640" cy="150" r="1.8" opacity=".7"/>
      <circle cx="600" cy="90" r="1.5" opacity=".6"/><circle cx="470" cy="250" r="2" opacity=".8"/>
      <circle cx="660" cy="300" r="1.6" opacity=".6"/><circle cx="390" cy="200" r="1.6" opacity=".5"/>
      <circle cx="700" cy="220" r="2.2" opacity=".7"/><circle cx="560" cy="330" r="1.5" opacity=".5"/>
    </g>
  </svg>`;

/* ---------- ENGINE ---------- */
// Power -> level. Each level costs more.
function xpForLevel(l){ return l<=1 ? 0 : Math.round(120 * Math.pow(l-1, 1.45)); } // cumulative XP to reach level l (level 1 = 0)
function levelFromXP(xp){ let l=1; while(xp >= xpForLevel(l+1)) l++; return l; }
function levelProgress(xp){
  const l = levelFromXP(xp), cur = xpForLevel(l), next = xpForLevel(l+1);
  return { level:l, cur, next, pct: Math.max(0, Math.min(100, ((xp-cur)/(next-cur))*100)), into: xp-cur, span: next-cur };
}

// Rank ladder: Cadet -> Trainee -> Ranger -> Veteran -> Captain -> Legend
const TIERS = [
  { name:'Cadet',    min:1,  c:'#2563EB' },
  { name:'Trainee',  min:5,  c:'#16A34A' },
  { name:'Ranger',   min:10, c:'#FFC83D' },
  { name:'Veteran',  min:18, c:'#FF3D9A' },
  { name:'Captain',  min:28, c:'#E12B38' },
  { name:'Legend',   min:40, c:'#E6E9EF' },
];
function tierFor(level){ let t=TIERS[0]; for(const x of TIERS){ if(level>=x.min) t=x; } return t; }

// Power Core — your suit charges up with daily morph-ins
const GROWTH = [
  { name:'Offline',      at:0,  glyph:'\u26AB' },
  { name:'Booting',      at:3,  glyph:'\u26A1' },
  { name:'Charged',      at:8,  glyph:'\uD83D\uDD0B' },
  { name:'Suited',       at:18, glyph:'\uD83D\uDEE1\uFE0F' },
  { name:'Supercharged', at:35, glyph:'\uD83C\uDF1F' },
  { name:'Max Power',    at:60, glyph:'\uD83D\uDCA5' },
];
function growthStage(checkins){
  let s=GROWTH[0], i=0, next=null;
  for(let k=0;k<GROWTH.length;k++){ if(checkins>=GROWTH[k].at){ s=GROWTH[k]; i=k; } }
  if(i<GROWTH.length-1) next=GROWTH[i+1];
  return { stage:s, idx:i, next, total:GROWTH.length };
}

function todayKey(){ const d=new Date(); return d.toISOString().slice(0,10); }
function awardXP(u, amt, reason){
  const before=levelFromXP(u.xp);
  u.xp += amt; u.feed = u.feed || [];
  if(amt>0) u.feed.unshift({g:'\u2728', title:reason, sub:'+'+amt+' Power', t:Date.now()});
  const after=levelFromXP(u.xp);
  if(after>before){ if(u&&u.id===DB.currentUserId){ window._celebrate={title:'Level '+after+' \u2014 '+tierFor(after).name, sub:'Rank up'}; } u.feed.unshift({g:'\uD83D\uDC51', title:'Reached Level '+after+' \u00b7 '+tierFor(after).name, sub:'Rank up', t:Date.now()});
    const tn=tierFor(after).name; if(tn==='Captain') earnBadge(u,'rank_captain'); if(tn==='Legend') earnBadge(u,'rank_legend'); }
  u.feed = u.feed.slice(0,60);
}
function earnBadge(u, key){
  if(!u || (u.badges||[]).includes(key)) return false;
  u.badges.push(key); if(u&&u.id===DB.currentUserId){ window._celebrate={title:'Medal unlocked', sub:(DB.badges[key]||{}).name||''}; } const b=DB.badges[key]; u.feed=u.feed||[];
  u.feed.unshift({g:'\uD83D\uDC8E', title:'Earned '+(b?b.name:key), sub:'Medal unlocked', t:Date.now()});
  u.feed=u.feed.slice(0,60); return true;
}
function awardCoins(u, amt, reason){ u.coins += amt; }
function checkBadges(u){ if(!u) return false; const before=(u.badges||[]).length;
  try{
    const lvl=(typeof levelFromXP==='function')?levelFromXP(u.xp):1;
    if(lvl>=3) earnBadge(u,'suited');
    if(u.xp>=1000) earnBadge(u,'power_1k');
    if(u.xp>=5000) earnBadge(u,'power_5k');
    const spent=(DB.store||[]).filter(x=>(u.purchases||[]).includes(x.id)).reduce((a,b)=>a+b.cost,0);
    if(spent>=2500) earnBadge(u,'big_spender');
    const done=(u.done||[]).length; if(done>=5) earnBadge(u,'drill_5'); if(done>=15) earnBadge(u,'drill_15');
    const myB=(DB.battles||[]).filter(b=>b.fighterId===u.id); if(myB.length>=1) earnBadge(u,'battle_first');
    const wins=myB.filter(b=>b.result==='Win').length; if(wins>=5) earnBadge(u,'battle_win5'); if(wins>=15) earnBadge(u,'battle_win15');
    if((u.rsvps||[]).length>=5) earnBadge(u,'reliable');
    if((u.streak||0)>=60) earnBadge(u,'streak_60');
    const posts=(DB.posts||[]).filter(p=>p.authorId===u.id).length; if(posts>=10) earnBadge(u,'voice');
    if((u.purchases||[]).length>=5) earnBadge(u,'collector');
    if((u.purchases||[]).includes('r11')) earnBadge(u,'vip');
    if((u.purchases||[]).includes('r20')) earnBadge(u,'crowned');
    if(u.xp>=10000) earnBadge(u,'power_10k');
    if(lvl>=10) earnBadge(u,'level_10');
    if(done>=30) earnBadge(u,'drill_30');
    if(wins>=30) earnBadge(u,'battle_win30');
    if((u.streak||0)>=90) earnBadge(u,'streak_90');
    if(posts>=50) earnBadge(u,'poster_50');
    if((u.coins||0)>=2000) earnBadge(u,'energy_rich');
    if((u.purchases||[]).length>=10) earnBadge(u,'collector_10');
    if((u.purchases||[]).includes('r12')) earnBadge(u,'champion');
    if((u.purchases||[]).includes('r19')) earnBadge(u,'guardian');
  }catch(e){}
  return (u.badges||[]).length>before;
}

function hash(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))|0; } return Math.abs(h); }

function toast(msg, kind){
  const t=document.getElementById('toast');
  const c = kind==='bad' ? 'border-rose/60' : kind==='gold' ? 'border-gold/60' : 'border-orchid/60';
  const d=document.createElement('div');
  d.className=`glass ${c} border text-chalk text-sm px-4 py-2.5 rounded-xl shadow-2xl fade-up`;
  d.textContent=msg;
  t.appendChild(d);
  setTimeout(()=>{ d.style.transition='opacity .4s,transform .4s'; d.style.opacity='0'; d.style.transform='translateY(8px)'; setTimeout(()=>d.remove(),420); }, 2400);
}

function _lum(hex){ hex=(hex||'').replace('#',''); if(hex.length===3) hex=hex.split('').map(c=>c+c).join(''); if(hex.length<6) return .5; const r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16); return (0.299*r+0.587*g+0.114*b)/255; }
function avatar(name, px, ring){
  const init=(name||'?').replace(/[^A-Za-z0-9]/g,'').slice(0,2).toUpperCase()||'?';
  if(ring){
    const txt=_lum(ring)>0.62?'#0B0A12':'#F4F1EA';
    const rw=Math.max(1,Math.round(px*0.05));
    return `<div class="shrink-0 grid place-items-center rounded-full font-display font-bold" style="width:${px}px;height:${px}px;font-size:${px*0.38}px;color:${txt};background:radial-gradient(circle at 34% 26%, #ffffffd0, ${ring} 48%, #000000aa 100%);box-shadow:0 0 0 ${rw}px ${ring}, 0 0 ${Math.round(px*0.5)}px -3px ${ring}, inset 0 -2px 6px rgba(0,0,0,.45);text-shadow:0 1px 2px rgba(0,0,0,.45)">${init}</div>`;
  }
  const h=hash(name); const a=h%360, b=(h*7)%360;
  return `<div class="shrink-0 grid place-items-center rounded-full font-display font-bold text-ink" style="width:${px}px;height:${px}px;font-size:${px*0.4}px;background:linear-gradient(135deg,hsl(${a} 55% 62%),hsl(${b} 60% 48%))">${init}</div>`;
}
function avatarOf(m,px,ring){ ring=ring||colorHex(m&&m.color); let base;
  if(m&&m.avatarImg){ const rw=Math.max(1,Math.round(px*0.05));
    base=`<div class="shrink-0 rounded-full bg-center bg-cover" style="width:${px}px;height:${px}px;background-image:url(${m.avatarImg});box-shadow:0 0 0 ${rw}px ${ring}, 0 0 ${Math.round(px*0.5)}px -3px ${ring}"></div>`; }
  else base=avatar(m?m.username:'?',px,ring);
  const p=(typeof topPerk==='function')?topPerk(m):null;
  if(p) return `<span class="shrink-0 inline-grid place-items-center rounded-full" style="border-radius:9999px;box-shadow:0 0 0 2px ${p.color}, 0 0 16px 2px ${p.color}99">${base}</span>`;
  return base;
}

function checkIn(){
  const u=me(); const t=todayKey();
  if(u.last_checkin===t){ toast('Already checked in today \u2014 come back tomorrow','bad'); return; }
  const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
  const twoAgo = new Date(Date.now()-2*86400000).toISOString().slice(0,10);
  if(u.last_checkin===yesterday){ u.streak=u.streak+1; }
  else if(u.last_checkin===twoAgo && (u.freezes||0)>0){ u.freezes--; u.streak=u.streak+1; u.feed=u.feed||[]; u.feed.unshift({g:'\u2744\uFE0F', title:'Streak freeze used', sub:'Missed a day \u2014 streak saved', t:Date.now()}); }
  else { u.streak=1; }
  u.last_checkin=t; u.checkins=(u.checkins||0)+1;
  const bonus = Math.min(50, (u.streak-1)*5);
  const gained = 30+bonus;
  awardXP(u, gained, 'Daily check-in');
  awardCoins(u, 10+Math.floor(bonus/2), 'Daily check-in');
  // badges
  if(u.checkins>=1) earnBadge(u,'first_morph');
  if(u.streak>=7) earnBadge(u,'power_streak');
  if(u.streak>=14) earnBadge(u,'unbreakable');
  if(u.streak>=30) earnBadge(u,'streak_30');
  if(u.streak>0 && u.streak%7===0 && (u.freezes||0)<3){ u.freezes=(u.freezes||0)+1; u.feed=u.feed||[]; u.feed.unshift({g:'\u2744\uFE0F', title:'Earned a streak freeze', sub:'7-day milestone', t:Date.now()}); }
  const g=growthStage(u.checkins);
  if(g.idx===GROWTH.length-1) earnBadge(u,'max_power');
  save(); render();
  toast(`+${gained} Power · streak ${u.streak} \uD83D\uDD25`,'gold');
}

function trendsStrip(){

    const set=new Set(); DB.members.forEach(m=>(m.feed||[]).forEach(it=>{ if(it.t>=s&&it.t<e&&/Power/.test(String(it.sub))) set.add(m.id); }));
    counts.push(set.size); }
  const max=Math.max(1,...counts);
  const bars=counts.map((c,i)=>`<div class="flex flex-col items-center gap-1 flex-1"><div class="flex items-end justify-center w-full" style="height:46px"><div class="w-5 rounded-t bg-gradient-to-t from-royal to-orchid" style="height:${Math.max(2,Math.round(c/max*46))}px" title="${c} active"></div></div><div class="text-[9px] text-steel">${labels[i]}</div><div class="text-[10px] font-mono text-chalk">${c}</div></div>`).join('');

function countdown(ts){
  const d=ts-Date.now(); if(d<=0) return 'Starting now';
  const day=Math.floor(d/86400000), h=Math.floor(d%86400000/3600000), m=Math.floor(d%3600000/60000);
  return day>0?`${day}d ${h}h`:h>0?`${h}h ${m}m`:`${m}m`;
}

  upsertProfile(u); render(); toast('Submitted for review \u2014 the owner will confirm it \u23F3','gold');
}
function _applyApproval(m,p){
  m.pending=(m.pending||[]).filter(x=>x.pid!==p.pid);
  if(p.kind==='quest'){ m.questDone=m.questDone||{}; m.questDone[p.qscope]=m.questDone[p.qscope]||{}; const key=p.qscope==='weekly'?_weekKey():_dayKey(); m.questDone[p.qscope][key]=m.questDone[p.qscope][key]||[]; if(!m.questDone[p.qscope][key].includes(p.ref)) m.questDone[p.qscope][key].push(p.ref); }
  else if(p.kind==='achv'){ m._achv=m._achv||[]; if(!m._achv.includes(p.ref)) m._achv.push(p.ref); }
  else { if(!m.done.includes(p.ref)) m.done.push(p.ref); }
  let _xp=p.xp||0, _co=p.coins||0; if(m.boostNext){ _xp*=2; m.boostNext=false; } if(activePerk(m,'r17')) _co*=2;
  awardXP(m,_xp,'Approved: '+p.title); awardCoins(m,_co,'Approved: '+p.title); if(p.badge) earnBadge(m,p.badge);

}
function _subCat(p){ return p.kind==='achv'?'achievements':p.kind==='challenge'?'missions':(p.qscope==='drill'?'trainings':'quests'); }

function approveAll(){ const u=me(); if(!u||(u.role!=='Owner'&&u.role!=='Manager')){ toast('Owners & managers only','bad'); return; } const RF=(typeof reviewFilter!=='undefined')?reviewFilter:'all'; const affected=new Set(); let n=0; DB.members.forEach(m=>{ (m.pending||[]).slice().forEach(p=>{ if(RF!=='all'&&_subCat(p)!==RF) return; _applyApproval(m,p); affected.add(m); n++; }); }); affected.forEach(m=>upsertOther(m)); render(); toast(n?('Approved '+n+' submission'+(n===1?'':'s')+' \u26A1'):'Nothing to approve here', n?'gold':'bad'); }
function approveCustom(mid,pid){ const m=DB.members.find(x=>x.id===mid); if(!m) return; const p=(m.pending||[]).find(x=>x.pid===pid); if(!p) return; const np=prompt('Power to award:', p.xp||0); if(np===null) return; const nc=prompt('Energy to award:', p.coins||0); if(nc===null) return; p.xp=Math.max(0,parseInt(np)||0); p.coins=Math.max(0,parseInt(nc)||0); approveSubmission(mid,pid); }

function approveSubmission(mid,pid){ const m=DB.members.find(x=>x.id===mid); if(!m) return; const p=(m.pending||[]).find(x=>x.pid===pid); if(!p){ render(); return; } _applyApproval(m,p); upsertOther(m); render(); toast(`Approved ${m.username}\u2019s submission`,'gold');

function loadJitsi(){
  return new Promise((res,rej)=>{
    if(window.JitsiMeetExternalAPI) return res();
    const s=document.createElement('script');
    s.src='https://meet.jit.si/external_api.js';
    s.async=true;
    s.onload=()=>res();
    s.onerror=()=>rej(new Error('load failed'));
    document.head.appendChild(s);
    setTimeout(()=>{ window.JitsiMeetExternalAPI ? res() : rej(new Error('timeout')); }, 7000);
  });
}

async function enterRoom(id, mode){
  const r=DB.rooms.find(x=>x.id===id); if(!r) return;

  app.innerHTML = shell(roomCallPanel(r, mode));
  const box=document.getElementById('jitsiBox');
  const room = ROOM_SALT + r.id;
  try{
    await loadJitsi();
    if(!activeRoom) return;            // user already left
    box.innerHTML='';
    jitsiApi = new JitsiMeetExternalAPI('meet.jit.si', {
      roomName: room, parentNode: box, width:'100%', height:'100%',
      userInfo:{ displayName: u.username },
      configOverwrite:{ prejoinPageEnabled:false, disableDeepLinking:true,
        startWithVideoMuted: mode==='audio', startWithAudioMuted:false, startAudioOnly: mode==='audio' },
      interfaceConfigOverwrite:{ MOBILE_APP_PROMO:false, SHOW_JITSI_WATERMARK:false, SHOW_WATERMARK_FOR_GUESTS:false, DEFAULT_BACKGROUND:'#0B0A12',
        TOOLBAR_BUTTONS: mode==='audio'
          ? ['microphone','desktop','chat','raisehand','participants-pane','tileview','settings','hangup']
          : ['microphone','camera','desktop','chat','raisehand','participants-pane','tileview','settings','hangup'] }
    });
    jitsiApi.addEventListener('readyToClose', leaveRoom);
  }catch(e){
    if(box) box.innerHTML = fallbackJoin(room, r.name);
  }
}

function disposeCall(){ try{ jitsiApi && jitsiApi.dispose(); }catch(e){} jitsiApi=null; activeRoom=null; }

function _emblem(ctx,cx,cy,s,color){ ctx.save(); ctx.translate(cx,cy); ctx.scale(s,s); ctx.strokeStyle=color; ctx.fillStyle=color; ctx.lineWidth=6.5; ctx.lineJoin='round';
  const off=(p)=>[p[0]-60,p[1]-76];
  ctx.beginPath(); [[26,42],[33,15],[46,33],[60,8],[74,33],[87,15],[94,42]].forEach((p,i)=>{const o=off(p); i?ctx.lineTo(o[0],o[1]):ctx.moveTo(o[0],o[1]);}); ctx.closePath(); ctx.fill();
  ctx.fillRect(26-60,42-76,68,8);
  ctx.beginPath(); ctx.arc(0,101-76,40,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); [[67,73],[47,106],[58,106],[53,130],[75,95],[63,95]].forEach((p,i)=>{const o=off(p); i?ctx.lineTo(o[0],o[1]):ctx.moveTo(o[0],o[1]);}); ctx.closePath(); ctx.fill();
  ctx.restore();
}

  const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return; const ac=new AC();
  [660,880,1320].forEach((fr,i)=>{ const o=ac.createOscillator(),g=ac.createGain(); o.type='triangle'; o.frequency.value=fr;
    const t=ac.currentTime+i*0.09; o.connect(g); g.connect(ac.destination);

  setTimeout(()=>{try{ac.close();}catch(e){}},900);
}catch(e){} }

function _rotPick(pool,tag,per,idx){ if(!pool||!pool.length) return []; const order=_seedShuffle(pool,tag); const out=[]; for(let k=0;k<per;k++) out.push(order[((idx*per)+k)%order.length]); return out; }

function uploadPic(input, kind){
  const file=input&&input.files&&input.files[0]; if(!file) return;
  if(!/^image\//.test(file.type)){ toast('Pick an image file','bad'); return; }
  if(!sb){ toast('Not connected','bad'); return; }
  const isB = kind==='banner'; const tw=isB?1200:256, th=isB?360:256;
  const reader=new FileReader();
  reader.onload=e=>{ const img=new Image();
    img.onload=()=>{ try{
      const cv=document.createElement('canvas'); cv.width=tw; cv.height=th; const ctx=cv.getContext('2d');
      const s=Math.max(tw/img.width, th/img.height), dw=img.width*s, dh=img.height*s;
      ctx.drawImage(img,(tw-dw)/2,(th-dh)/2,dw,dh);
      cv.toBlob(async (blob)=>{
        if(!blob){ toast('Could not process image','bad'); return; }
        const u=me(); const path=u.id+'/'+(isB?'banner':'avatar')+'_'+Date.now()+'.jpg';
        toast('Uploading\u2026');
        const up=await sb.storage.from('media').upload(path, blob, {contentType:'image/jpeg', upsert:true});
        if(up.error){ toast('Upload failed: '+up.error.message,'bad'); console.error(up.error); return; }
        const pub=sb.storage.from('media').getPublicUrl(path);
        const url=pub&&pub.data?pub.data.publicUrl:null;
        if(!url){ toast('Could not get image URL','bad'); return; }
        if(isB) u.bannerImg=url; else u.avatarImg=url;
        upsertProfile(u); render(); toast(isB?'Banner updated':'Profile picture updated','gold');
      }, 'image/jpeg', isB?0.8:0.85);
    }catch(err){ toast('Could not process image','bad'); console.error(err); } };
    img.onerror=()=>toast('Could not read that image','bad'); img.src=e.target.result;
  };
  reader.onerror=()=>toast('Upload failed','bad');
  reader.readAsDataURL(file);
}

    const cv=document.createElement('canvas'); cv.width=w; cv.height=h; cv.getContext('2d').drawImage(img,0,0,w,h);
    cv.toBlob(async (blob)=>{ if(!blob) return; const u=me(); const path=u.id+'/post_'+Date.now()+'.jpg'; toast('Uploading\u2026');
      const up=await sb.storage.from('media').upload(path, blob, {contentType:'image/jpeg',upsert:true}); if(up.error){ toast('Upload failed: '+up.error.message,'bad'); return; }
      postDraft.img=sb.storage.from('media').getPublicUrl(path).data.publicUrl; render();
    }, 'image/jpeg', 0.8);
  }catch(err){ toast('Could not process image','bad'); } }; img.src=e.target.result; }; r.readAsDataURL(file); }
function uploadOpp(input){ const file=input&&input.files&&input.files[0]; if(!file) return; if(!/^image\//.test(file.type)){ toast('Pick an image','bad'); return; }
  const r=new FileReader(); r.onload=e=>{ const img=new Image(); img.onload=()=>{ try{
    const cv=document.createElement('canvas'); cv.width=128; cv.height=128; const ctx=cv.getContext('2d'); const s=Math.max(128/img.width,128/img.height),dw=img.width*s,dh=img.height*s; ctx.drawImage(img,(128-dw)/2,(128-dh)/2,dw,dh);
    cv.toBlob(async (blob)=>{ if(!blob) return; const u=me(); const path=u.id+'/opp_'+Date.now()+'.jpg'; if(typeof snapBattleForm==='function') snapBattleForm(); toast('Uploading\u2026');
      const up=await sb.storage.from('media').upload(path, blob, {contentType:'image/jpeg',upsert:true}); if(up.error){ toast('Upload failed: '+up.error.message,'bad'); return; }
      editing.oppImg=sb.storage.from('media').getPublicUrl(path).data.publicUrl; render();
    }, 'image/jpeg', 0.8);
  }catch(err){ toast('Could not process image','bad'); } }; img.src=e.target.result; }; r.readAsDataURL(file); }
async function reactFeed(key,kind){ DB.reactions=DB.reactions||{}; const r=DB.reactions[key]=DB.reactions[key]||{}; r[kind]=(r[kind]||0)+1; render(); const { error } = await sb.from('reactions').upsert({key, data:r}); if(error) console.warn('react', error.message); }
function sendMessage(id){ const m=DB.members.find(x=>x.id===id); if(!m) return; const msg=(prompt('Message to '+m.username+':')||'').trim(); if(!msg) return; m.inbox=m.inbox||[]; m.inbox.unshift({id:'m_'+Date.now().toString(36),type:'message',from:(me().username||'Owner'),text:msg,t:Date.now(),read:false}); upsertOther(m); toast('Message sent','gold'); }
function sendNudge(id){ const m=DB.members.find(x=>x.id===id); if(!m) return; m.inbox=m.inbox||[]; m.inbox.unshift({id:'n_'+Date.now().toString(36),type:'nudge',from:'HQ',text:'Time to morph in \u2014 your squad needs you. \u26A1',t:Date.now(),read:false}); upsertOther(m); toast('Nudge sent to '+m.username,'gold'); }
function nudgeAllBehind(){ const tk=(typeof todayKey==='function')?todayKey():null; let n=0; DB.members.forEach(m=>{ if(m.last_checkin!==tk){ m.inbox=m.inbox||[]; m.inbox.unshift({id:'n_'+Date.now().toString(36)+Math.floor(Math.random()*999),type:'nudge',from:'HQ',text:'Morph in today to keep your streak alive! \u26A1',t:Date.now(),read:false}); upsertOther(m); n++; } }); toast('Nudged '+n+' rangers','gold'); }
function resetAll(){ toast('Manage data from the Supabase dashboard now','bad'); }

boot();
